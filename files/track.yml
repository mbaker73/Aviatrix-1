slug: k8s-cluster-aas
title: "Kubernetes Cluster-as-a-Service with Aviatrix DCF"
description: |
  Build a production-ready multi-team Kubernetes platform on AWS where each team 
  gets a dedicated EKS cluster in its own VPC. Workload isolation is enforced by 
  Aviatrix Distributed Cloud Firewall (DCF) — no team can reach another team's 
  cluster without an explicit PERMIT rule.

  You will deploy three layers of infrastructure using Terraform:
  - **Layer 1** — Transit gateway, VPCs, spokes, and DCF policy
  - **Layer 2** — EKS control planes for three teams (parallel)
  - **Layer 3** — Node groups and Helm charts (parallel)

  Then you'll verify the DCF policy with live traffic tests across all team clusters.

